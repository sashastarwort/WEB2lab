<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ML Alarm - Вхід</title>
    <link rel="icon" type="image/png" href="Alarm.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .navbar-custom { backdrop-filter: blur(10px); }
        .nav-link.active { color: #ffc107 !important; border-bottom: 2px solid #ffc107; }
        .card-custom { border: 1px solid rgba(255, 255, 255, 0.1); }
        .is-invalid ~ .invalid-feedback { display: block; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-black text-light pt-5 mt-5">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark bg-opacity-75 navbar-custom fixed-top border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand text-light fw-bold fs-4" href="index.html"><i class="bi bi-cpu text-warning me-2"></i>ML Alarm</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link text-light" href="index.html"><i class="bi bi-alarm me-1"></i>Будильник</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="profile.html"><i class="bi bi-person me-1"></i>Профіль</a></li>
                    <li class="nav-item"><a class="nav-link text-light" href="about.html"><i class="bi bi-info-circle me-1"></i>Про додаток</a></li>
                    <li class="nav-item" id="navLogin"><a class="nav-link text-light active" href="login.html"><i class="bi bi-box-arrow-in-right me-1"></i>Вхід</a></li>
                    <li class="nav-item" id="navRegister"><a class="nav-link text-light" href="register.html"><i class="bi bi-person-plus me-1"></i>Реєстрація</a></li>
                    <li class="nav-item d-none" id="navLogout"><a class="nav-link text-light" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-1"></i>Вийти</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1 d-flex justify-content-center align-items-center">
        <div class="card card-custom bg-dark shadow-lg rounded-3 w-100" style="max-width:450px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right text-warning d-block mb-2" style="font-size:2.5rem;"></i>
                    <h2 class="card-title text-warning fw-bold">Авторизація</h2>
                    <p class="text-secondary small">Введи свої дані для входу</p>
                </div>
                <div id="alertBox" class="d-none mb-3"></div>
                <div class="mb-3">
                    <label for="loginEmail" class="form-label text-secondary small">Електронна пошта</label>
                    <div class="input-group">
                        <span class="input-group-text bg-black border-secondary"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" class="form-control border-secondary" id="loginEmail" placeholder="name@example.com">
                    </div>
                    <div class="invalid-feedback" id="emailError"></div>
                </div>
                <div class="mb-4">
                    <label for="loginPassword" class="form-label text-secondary small">Пароль</label>
                    <div class="input-group">
                        <span class="input-group-text bg-black border-secondary"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" class="form-control border-secondary" id="loginPassword" placeholder="••••••••">
                        <button class="btn btn-outline-secondary border-secondary" type="button" id="togglePass"><i class="bi bi-eye" id="togglePassIcon"></i></button>
                    </div>
                    <div class="invalid-feedback" id="passError"></div>
                </div>
                <button type="button" class="btn btn-warning w-100 text-dark fw-bold shadow-sm mb-3" id="loginBtn">
                    <i class="bi bi-check2-circle me-1"></i>Увійти
                </button>
                <div class="text-center">
                    <small class="text-secondary">Ще немає акаунта? <a href="register.html" class="text-warning text-decoration-none fw-semibold">Створити зараз</a></small>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark bg-opacity-75 navbar-custom text-white text-center py-3 mt-auto border-top border-secondary">
        <div class="container"><p class="mb-0 small text-secondary">&copy; 2026 ML Alarm. Твій час під твоїм контролем.</p></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // ===== STORAGE =====
    const Storage = {
        getUsers() { return JSON.parse(localStorage.getItem('ml_alarm_users') || '[]'); },
        getCurrentUser() {
            const email = localStorage.getItem('ml_alarm_current_user');
            if (!email) return null;
            return this.getUsers().find(u => u.email === email) || null;
        },
        setCurrentUser(email) { localStorage.setItem('ml_alarm_current_user', email); },
        clearCurrentUser() { localStorage.removeItem('ml_alarm_current_user'); },
    };

    // ===== NAV =====
    (function updateNav() {
        if (Storage.getCurrentUser()) {
            document.getElementById('navLogin').classList.add('d-none');
            document.getElementById('navRegister').classList.add('d-none');
            document.getElementById('navLogout').classList.remove('d-none');
        }
    })();

    if (Storage.getCurrentUser()) window.location.href = 'index.html';

    // ===== MODEL =====
    const LoginModel = {
        validate(email, password) {
            const e = {};
            if (!email.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) e.email = 'Введіть коректний email';
            if (!password) e.password = 'Введіть пароль';
            return e;
        },
        login(email, password) {
            const users = Storage.getUsers();
            const user = users.find(u => u.email === email.trim().toLowerCase() && u.password === password);
            if (!user) return { success: false, message: 'Невірний email або пароль' };
            Storage.setCurrentUser(user.email);
            return { success: true };
        },
    };

    // ===== VIEW =====
    const LoginView = {
        clearErrors() {
            ['loginEmail', 'loginPassword'].forEach(id => document.getElementById(id).classList.remove('is-invalid'));
            document.getElementById('emailError').textContent = '';
            document.getElementById('passError').textContent = '';
            document.getElementById('alertBox').className = 'd-none mb-3';
        },
        showFieldErrors(errors) {
            if (errors.email) { document.getElementById('loginEmail').classList.add('is-invalid'); document.getElementById('emailError').textContent = errors.email; }
            if (errors.password) { document.getElementById('loginPassword').classList.add('is-invalid'); document.getElementById('passError').textContent = errors.password; }
        },
        showAlert(msg, type = 'danger') {
            const box = document.getElementById('alertBox');
            box.className = `alert alert-${type} small mb-3`;
            box.textContent = msg;
        },
    };

    // ===== CONTROLLER =====
    function handleLogin() {
        LoginView.clearErrors();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const errors = LoginModel.validate(email, password);
        if (Object.keys(errors).length > 0) { LoginView.showFieldErrors(errors); return; }
        const result = LoginModel.login(email, password);
        if (result.success) {
            LoginView.showAlert('Вхід успішний! Переходимо...', 'success');
            setTimeout(() => window.location.href = 'index.html', 1000);
        } else {
            LoginView.showAlert(result.message);
        }
    }

    document.getElementById('loginBtn').addEventListener('click', handleLogin);
    document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
    document.getElementById('togglePass').addEventListener('click', () => {
        const input = document.getElementById('loginPassword');
        const icon = document.getElementById('togglePassIcon');
        input.type = input.type === 'password' ? 'text' : 'password';
        icon.className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    });
    document.getElementById('logoutBtn').addEventListener('click', e => {
        e.preventDefault(); Storage.clearCurrentUser(); window.location.href = 'login.html';
    });
    </script>
</body>
</html>
